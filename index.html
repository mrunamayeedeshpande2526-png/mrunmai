<!DOCTYPE html>
<html>
<head>
    <title>Simple Dynamic Page</title>
</head>
<body>

    <h3 id="output">Hello!</h3>
    <button onclick="updateText()">Click Me</button>

    <script>
        function updateText() {
            document.getElementById("output").innerHTML = "Text Updated!";
        }
    </script>

</body>
</html>
